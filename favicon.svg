<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#1a1916"/>
  <!-- Orbital rings -->
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="#c8602a" stroke-width="1.5" opacity="0.7" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="#c8602a" stroke-width="1.5" opacity="0.5" transform="rotate(30 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="#c8602a" stroke-width="1.5" opacity="0.4" transform="rotate(90 32 32)"/>
  <!-- Center nucleus -->
  <circle cx="32" cy="32" r="4" fill="#c8602a"/>
  <!-- Y monogram -->
  <text x="32" y="37" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#f5f3ef" text-anchor="middle" font-weight="400">Y</text>
</svg>
